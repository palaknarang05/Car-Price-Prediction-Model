<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Price Prediction System</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1d4ed8,#3b82f6);display:flex;justify-content:center;align-items:center;padding:30px}
.container{width:100%;max-width:900px;background:rgba(255,255,255,.96);backdrop-filter:blur(12px);border-radius:22px;padding:35px;box-shadow:0 20px 45px rgba(0,0,0,.25)}
h1{text-align:center;color:#1e3a8a;font-size:2.2rem}
.subtitle{text-align:center;color:#6b7280;margin:10px 0 30px}
form{display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.group{display:flex;flex-direction:column}
label{font-weight:600;margin-bottom:7px;color:#374151}
label i{color:#2563eb;margin-right:6px}
input,select{padding:13px;border:1px solid #d1d5db;border-radius:12px;font-size:15px}
input:focus,select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.15)}
.full{grid-column:1/-1}
button{padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;font-size:17px;font-weight:600;cursor:pointer;transition:.3s}
button:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(37,99,235,.35)}
.result{margin-top:25px;background:#ecfdf5;border-left:6px solid #16a34a;border-radius:14px;padding:20px;text-align:center}
.result h2{color:#15803d;margin-bottom:8px}
.result p{font-size:28px;font-weight:700;color:#166534}
.footer{text-align:center;margin-top:25px;color:#6b7280;font-size:.9rem}
@media(max-width:768px){form{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1><i class="fa-solid fa-car-side"></i> Car Price Prediction</h1>
<p class="subtitle">Estimate the selling price of your used car using a Machine Learning model.</p>

<form action="/predict" method="POST">
<div class="group"><label><i class="fa-solid fa-car"></i>Brand</label><select name="brand" required>
<option>Maruti</option><option>Hyundai</option><option>Honda</option><option>Toyota</option><option>Mahindra</option><option>Tata</option><option>Ford</option><option>Renault</option><option>Volkswagen</option><option>BMW</option><option>Audi</option><option>Mercedes-Benz</option><option>Skoda</option><option>Jeep</option><option>Nissan</option><option>Chevrolet</option><option>Datsun</option><option>Kia</option><option>MG</option>
</select></div>

<div class="group"><label><i class="fa-solid fa-calendar"></i>Manufacturing Year</label><input type="number" name="year" placeholder="2018" required></div>

<div class="group"><label><i class="fa-solid fa-road"></i>Kilometers Driven</label><input type="number" name="km_driven" placeholder="45000" required></div>

<div class="group"><label><i class="fa-solid fa-gas-pump"></i>Fuel Type</label><select name="fuel">
<option>Petrol</option><option>Diesel</option><option>CNG</option><option>LPG</option><option>Electric</option>
</select></div>

<div class="group"><label><i class="fa-solid fa-store"></i>Seller Type</label><select name="seller_type">
<option>Individual</option><option>Dealer</option><option>Trustmark Dealer</option>
</select></div>

<div class="group"><label><i class="fa-solid fa-gears"></i>Transmission</label><select name="transmission">
<option>Manual</option><option>Automatic</option>
</select></div>

<div class="group full"><label><i class="fa-solid fa-user"></i>Owner</label><select name="owner">
<option>First Owner</option><option>Second Owner</option><option>Third Owner</option><option>Fourth & Above Owner</option><option>Test Drive Car</option>
</select></div>

<button class="full" type="submit"><i class="fa-solid fa-wand-magic-sparkles"></i> Predict Price</button>
</form>

{% if prediction_text %}
<div class="result">
<h2>Estimated Selling Price</h2>
<p>{{ prediction_text }}</p>
</div>
{% endif %}

<div class="footer">
Developed by <strong>Palak Narang</strong> | Flask • Scikit-learn • Random Forest
</div>

</div>
</body>
</html>
