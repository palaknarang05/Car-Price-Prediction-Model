<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Car Price Prediction System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:470px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    color:#1e3c72;
    margin-bottom:25px;
}

label{
    display:block;
    margin-top:12px;
    margin-bottom:5px;
    font-weight:bold;
}

input,
select{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus,
select:focus{
    outline:none;
    border:2px solid #1e3c72;
}

button{
    width:100%;
    padding:12px;
    margin-top:25px;
    border:none;
    border-radius:8px;
    background:#1e3c72;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#16325c;
}

.result{
    margin-top:25px;
    padding:15px;
    background:#e8f5e9;
    border-left:5px solid green;
    border-radius:8px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    color:#155724;
}

</style>

</head>

<body>

<div class="container">

<h1> Car Price Prediction</h1>

<form action="/predict" method="POST">

<label>Brand</label>
<select name="brand" required>
<option value="Maruti">Maruti</option>
<option value="Hyundai">Hyundai</option>
<option value="Honda">Honda</option>
<option value="Toyota">Toyota</option>
<option value="Mahindra">Mahindra</option>
<option value="Tata">Tata</option>
<option value="Ford">Ford</option>
<option value="Renault">Renault</option>
<option value="Volkswagen">Volkswagen</option>
<option value="BMW">BMW</option>
<option value="Audi">Audi</option>
<option value="Mercedes-Benz">Mercedes-Benz</option>
<option value="Skoda">Skoda</option>
<option value="Jeep">Jeep</option>
<option value="Nissan">Nissan</option>
<option value="Chevrolet">Chevrolet</option>
<option value="Datsun">Datsun</option>
<option value="Kia">Kia</option>
<option value="MG">MG</option>
</select>

<label>Manufacturing Year</label>
<input type="number" name="year" placeholder="e.g. 2018" required>

<label>Kilometers Driven</label>
<input type="number" name="km_driven" placeholder="e.g. 45000" required>

<label>Fuel Type</label>
<select name="fuel">
<option value="Petrol">Petrol</option>
<option value="Diesel">Diesel</option>
<option value="CNG">CNG</option>
<option value="LPG">LPG</option>
<option value="Electric">Electric</option>
</select>

<label>Seller Type</label>
<select name="seller_type">
<option value="Individual">Individual</option>
<option value="Dealer">Dealer</option>
<option value="Trustmark Dealer">Trustmark Dealer</option>
</select>

<label>Transmission</label>
<select name="transmission">
<option value="Manual">Manual</option>
<option value="Automatic">Automatic</option>
</select>

<label>Owner</label>
<select name="owner">
<option value="First Owner">First Owner</option>
<option value="Second Owner">Second Owner</option>
<option value="Third Owner">Third Owner</option>
<option value="Fourth & Above Owner">Fourth & Above Owner</option>
<option value="Test Drive Car">Test Drive Car</option>
</select>

<button type="submit">Predict Price</button>

</form>

{% if prediction_text %}
<div class="result">
{{ prediction_text }}
</div>
{% endif %}

</div>

</body>
</html>
